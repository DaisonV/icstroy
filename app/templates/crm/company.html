{% extends "crm/base.html" %}{% block title %}Реквизиты компании{% endblock %}{% block page_title %}Реквизиты компании{% endblock %}
{% block content %}<div class="page-intro"><div><h2>Данные IC STROY GROUP</h2><p>Используются в коммерческих предложениях и документах CRM</p></div><span class="info-badge">БИН {{ company.bin }}</span></div><article class="admin-panel form-panel"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="admin-form-grid">
<label><span>Юридическое наименование</span><input name="legal_name" value="{{ company.legal_name }}" required></label><label><span>Бренд</span><input name="brand_name" value="{{ company.brand_name }}" required></label><label><span>БИН</span><input name="bin" value="{{ company.bin }}" required></label><label><span>Телефон</span><input name="phone" value="{{ company.phone }}" required></label><label><span>Адрес</span><input name="address" value="{{ company.address }}" required></label><label><span>Сайт</span><input type="url" name="website" value="{{ company.website }}" required></label><label><span>Руководитель</span><input name="director_name" value="{{ company.director_name or '' }}"></label><label><span>Лет опыта</span><input type="number" name="experience_years" value="{{ company.experience_years }}"></label><label><span>Заголовок КП</span><input name="proposal_title" value="{{ company.proposal_title }}"></label><label><span>Налоговая пометка</span><input name="vat_note" value="{{ company.vat_note }}"></label><label class="span-2"><span>Вводный текст КП</span><textarea name="proposal_intro" rows="5">{{ company.proposal_intro }}</textarea></label></div><div class="form-actions"><button class="admin-primary">Сохранить реквизиты</button></div></form></article>{% endblock %}
