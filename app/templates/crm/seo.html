{% extends "crm/base.html" %}{% block title %}SEO{% endblock %}{% block page_title %}SEO сайта{% endblock %}
{% block content %}<div class="page-intro"><div><h2>Поисковая оптимизация</h2><p>Метаданные главной страницы, Open Graph и индексация</p></div><a class="view-site" href="{{ url_for('public.sitemap') }}" target="_blank">Открыть sitemap.xml ↗</a></div><form class="admin-panel seo-form" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><section><span>Основные метаданные</span><label><b>Title</b><input name="title" maxlength="180" value="{{ setting.title }}" required><small>Рекомендуется 50–65 символов</small></label><label><b>Description</b><textarea name="description" maxlength="320" rows="4" required>{{ setting.description }}</textarea><small>Рекомендуется 140–170 символов</small></label><label><b>Ключевые фразы</b><textarea name="keywords" rows="3">{{ setting.keywords or '' }}</textarea></label></section><section><span>Индексация и социальные сети</span><label><b>Canonical URL</b><input type="url" name="canonical_url" value="{{ setting.canonical_url or '' }}" placeholder="https://icstroy.kz/"></label><label><b>Open Graph изображение</b><input type="url" name="og_image" value="{{ setting.og_image or '' }}" placeholder="https://..."></label><label><b>Robots</b><select name="robots"><option {{ 'selected' if setting.robots == 'index,follow' }}>index,follow</option><option {{ 'selected' if setting.robots == 'noindex,nofollow' }}>noindex,nofollow</option></select></label></section><button class="admin-primary">Сохранить и опубликовать</button></form>{% endblock %}
